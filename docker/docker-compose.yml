version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: devops-demo-app
    ports:
      - "${APP_PORT:-8081}:80"
    environment:
      APP_NAME: "DevOps Demo App"
      APP_ENV: "development"
      DB_HOST: "db"
      DB_PORT: "3306"
      DB_NAME: "demo_app"
      DB_USER: "demo_user"
      DB_PASSWORD: "Train123#demo"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: devops-demo-db
    environment:
      MYSQL_ROOT_PASSWORD: "Train123#demo"
      MYSQL_DATABASE: "demo_app"
      MYSQL_USER: "demo_user"
      MYSQL_PASSWORD: "Train123#demo"
    volumes:
      - db_data:/var/lib/mysql
      - ../app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../app/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "3307:3306"

volumes:
  db_data:
